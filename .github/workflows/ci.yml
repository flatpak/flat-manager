on: [push, pull_request]

name: Continuous integration

jobs:
  check:
    name: Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get install -y libostree-dev
      - name: Check
        run: cargo check

  test:
    name: Test Suite
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get install -y libostree-dev
      - name: Check
        run: cargo test

  end-to-end:
    name: End-to-end upload test
    runs-on: ubuntu-22.04
    steps:
     - uses: actions/checkout@v4

     - name: Start containers
       working-directory: ./tests
       run: |
         set -euxo pipefail
         docker compose up -d --build
         docker compose ps -a

     - name: Wait for flat-manager to be running
       working-directory: ./tests
       run: |
         set -euxo pipefail
         for _ in $(seq 1 15); do
           if [ -n "$(docker compose ps --status running --quiet flat-manager)" ]; then
             docker compose ps -a
             exit 0
           fi
           sleep 2
         done
         echo "flat-manager failed to reach running state"
         docker compose ps -a
         docker compose logs --no-color --timestamps flat-manager db || true
         exit 1

     - name: Run test
       working-directory: ./tests
       run: |
         set -euxo pipefail
         docker compose ps -a
         cid="$(docker compose ps -q flat-manager)"
         if [ -z "$cid" ]; then
           echo "No container ID found for flat-manager"
           docker compose logs --no-color --timestamps flat-manager db || true
           exit 1
         fi
         docker inspect --format \
           'flat-manager state={{.State.Status}} running={{.State.Running}} exit={{.State.ExitCode}} oom={{.State.OOMKilled}} error={{.State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' \
           "$cid"
         if [ "$(docker inspect --format '{{.State.Running}}' "$cid")" != "true" ]; then
           echo "flat-manager container is not running; dumping logs"
           docker logs "$cid" || true
           docker compose logs --no-color --timestamps flat-manager db || true
           exit 1
         fi
         rc=0
         docker compose exec -T -e PYTHONUNBUFFERED=1 flat-manager ./tests/run-test.py || rc=$?
         if [ "$rc" -ne 0 ]; then
           echo "run-test.py failed with exit code $rc"
           docker compose ps -a
           docker stats --no-stream || true
           cid_after="$(docker compose ps -q flat-manager)"
           if [ -n "$cid_after" ]; then
             docker inspect --format \
               'flat-manager post-test state={{.State.Status}} running={{.State.Running}} exit={{.State.ExitCode}} oom={{.State.OOMKilled}} restart={{.RestartCount}} error={{.State.Error}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' \
               "$cid_after" || true
           fi
           docker compose logs --no-color --timestamps --tail=300 flat-manager db || true
           exit "$rc"
         fi

     - name: Dump compose diagnostics on failure
       if: failure()
       working-directory: ./tests
       run: |
         docker compose ps -a
         docker compose logs --no-color --timestamps || true

  fmt:
    name: Rustfmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install dependencies
        run: sudo apt-get install -y libostree-dev
      - name: Clippy
        run: cargo clippy -- -D warnings

  ruff-lint:
    name: ruff-lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v2

  ruff-format:
    name: ruff-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v2
        with:
          args: 'format --check'

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        if: github.ref == 'refs/heads/master'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/flatpak/flat-manager:${{ github.sha }}
            ghcr.io/flatpak/flat-manager:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=ssh://git@github.com:${{ github.repository }}.git
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
